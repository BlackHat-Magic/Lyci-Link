worker_processes auto;
error_log /dev/stderr;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/javascript                       js mjs;
        application/javascript                js mjs;
        application/json                      json;
        image/png                             png;
        image/jpeg                            jpeg jpg;
        image/gif                             gif;
        image/svg+xml                         svg svgz;
        image/x-icon                          ico;
        image/webp                            webp;
        font/woff                             woff;
        font/woff2                            woff2;
        application/font-woff                 woff;
        application/font-woff2                woff2;
    }

    server {
        listen 80;
        server_name _;

        root /app/static;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /yt {
            return 301 https://www.youtube.com/@lyciberi;
        }

        location /youtube {
            return 301 https://www.youtube.com/@lyciberi;
        }

        location /t {
            return 301 https://twitter.com/lyciberi;
        }

        location /x {
            return 301 https://twitter.com/lyciberi;
        }

        location /twt {
            return 301 https://twitter.com/lyciberi;
        }

        location /twitter {
            return 301 https://twitter.com/lyciberi;
        }

        location /ttv {
            return 301 https://www.twitch.tv/lyciberi;
        }

        location /twitch {
            return 301 https://www.twitch.tv/lyciberi;
        }

        location /discord {
            return 301 https://discord.com/invite/Ywh4xN6YFX;
        }

        location /bsky {
            return 301 https://bsky.app/profile/lyciberi.bsky.social;
        }

        location /bluesky {
            return 301 https://bsky.app/profile/lyciberi.bsky.social;
        }

        location /tiktok {
            return 301 https://www.tiktok.com/@lyciberi;
        }

        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
